<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- Badge background rounded square -->
  <rect x="2" y="2" width="68" height="68" rx="14" fill="url(#g1)"/>
  <!-- Inner border shine -->
  <rect x="6" y="6" width="60" height="60" rx="11" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Abstract "connect" lines inside badge -->
  <circle cx="36" cy="28" r="5" fill="none" stroke="#0a1628" stroke-width="2.5"/>
  <circle cx="21" cy="44" r="4" fill="none" stroke="#0a1628" stroke-width="2"/>
  <circle cx="51" cy="44" r="4" fill="none" stroke="#0a1628" stroke-width="2"/>
  <line x1="36" y1="33" x2="23" y2="41" stroke="#0a1628" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="33" x2="49" y2="41" stroke="#0a1628" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="44" x2="47" y2="44" stroke="#0a1628" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>

  <!-- FCI text in badge -->
  <text x="36" y="63" text-anchor="middle"
    font-family="'Arial Black', Helvetica, sans-serif"
    font-weight="900" font-size="11" letter-spacing="3"
    fill="#0a1628">FCI</text>

  <!-- FAIR CONNECTS text -->
  <text x="88" y="34"
    font-family="'Arial Black', Helvetica, sans-serif"
    font-weight="900" font-size="26" letter-spacing="-0.5"
    fill="#ffffff">FAIR <tspan fill="url(#g1)">CONNECTS</tspan></text>

  <!-- INDIA -->
  <text x="90" y="54"
    font-family="Helvetica, Arial, sans-serif"
    font-weight="700" font-size="15" letter-spacing="8"
    fill="#c9a84c">INDIA</text>

  <!-- Thin gold rule under INDIA -->
  <line x1="90" y1="59" x2="310" y2="59" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>

  <!-- EXHIBITION ORGANIZERS -->
  <text x="90" y="69"
    font-family="Helvetica, Arial, sans-serif"
    font-weight="400" font-size="8" letter-spacing="3.2"
    fill="#8892a4">EXHIBITION ORGANIZERS</text>
</svg>
